<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能刷题器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --primary-hover: #45a049;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #666666;
            --border-color: #dddddd;
            --correct-color: #d4edda;
            --correct-border: #c3e6cb;
            --wrong-color: #f8d7da;
            --wrong-border: #f5c6cb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1, h2, h3 { margin-top: 0; }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"], input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 8px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover:not(:disabled) { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; }
        .btn-info:hover:not(:disabled) { background-color: #138496; }
        .btn-warning { background-color: #ffc107; color: #333; }
        .btn-warning:hover:not(:disabled) { background-color: #e0a800; }

        /* 答题区样式 */
        #quiz-area { display: none; }
        .question-title { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        
        .option-item {
            display: block;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .option-item:hover { background-color: #f8f9fa; }
        .option-item input { margin-right: 10px; }
        
        .option-item.correct { background-color: var(--correct-color); border-color: var(--correct-border); }
        .option-item.wrong { background-color: var(--wrong-color); border-color: var(--wrong-border); }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        .feedback.success { background-color: var(--correct-color); color: #155724; display: block; }
        .feedback.error { background-color: var(--wrong-color); color: #721c24; display: block; }

        .action-bars { margin-top: 20px; display: flex; gap: 15px; justify-content: flex-end; }
        
        .progress-bar { font-size: 0.9em; color: var(--text-light); text-align: right; margin-bottom: 10px;}

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { cursor: pointer; font-size: 1.5em; color: #999; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
        
        .empty-state { text-align: center; color: var(--text-light); padding: 40px 0; }
        
        /* 載入中動畫 */
        #loading-area { text-align: center; padding: 40px 0; font-size: 1.2em; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📚 智能刷题器</h1>
        <div class="control-panel">
            <div class="input-group">
                <label>姓名：</label>
                <input type="text" id="user-name" value="匿名">
                <button onclick="handleNameSet()">确定</button>
            </div>
            <div class="input-group">
                <label>练习数量：</label>
                <input type="number" id="question-count" min="1" value="10">
                <button onclick="handleCountSet()">抽取重置</button>
            </div>
            <button onclick="openHistory()" class="btn-info">查看记录</button>
            <button onclick="clearProgress()" class="btn-warning">重置刷題進度</button>
        </div>
        <div id="bank-info" style="margin-top: 15px; font-size: 0.9em; color: var(--text-light);"></div>
    </div>

    <div class="card" id="loading-area">
        🔄 正在從伺服器載入題庫，請稍候...
    </div>

    <div class="card" id="quiz-area">
        <div class="progress-bar" id="progress-text"></div>
        <div class="question-title" id="question-title"></div>
        <div id="options-container"></div>
        
        <div class="feedback" id="feedback"></div>

        <div class="action-bars">
            <button id="btn-submit" onclick="submitAnswer()">提交答案</button>
            <button id="btn-next" onclick="nextQuestion()" disabled>下一题</button>
        </div>
    </div>
    
    <div class="card empty-state" id="empty-area" style="display:none;">
        ⚠️ 題庫載入失敗，請確認 data.xlsx 檔案是否存在。
    </div>
</div>

<div class="modal" id="history-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>做题记录</h3>
            <span class="close-btn" onclick="closeHistory()">&times;</span>
        </div>
        <div id="history-table-container"></div>
        <div class="action-bars" style="justify-content: space-between;">
            <button class="btn-danger" onclick="clearHistory()">清空记录</button>
            <button class="btn-info" onclick="exportHistory()">导出CSV</button>
        </div>
    </div>
</div>

<script>
    // 状态管理
    const state = {
        questionBank: [],    
        currentQuiz: [],     
        currentIndex: 0,     
        correctCount: 0,     
        userName: '匿名',    
        practiceCount: 10,   
        quizInProgress: false, 
        history: [],
        doneQuestions: []    // 新增：紀錄已做過題目的標題清單
    };

    // 網頁載入時初始化
    window.onload = function() {
        // 恢復使用者設定
        const savedHistory = localStorage.getItem('quizHistory');
        const savedName = localStorage.getItem('userName');
        const savedCount = localStorage.getItem('practiceCount');
        const savedDone = localStorage.getItem('doneQuestions');

        if (savedHistory) state.history = JSON.parse(savedHistory);
        if (savedDone) state.doneQuestions = JSON.parse(savedDone);
        if (savedName) {
            state.userName = savedName;
            document.getElementById('user-name').value = savedName;
        }
        if (savedCount) {
            state.practiceCount = parseInt(savedCount);
            document.getElementById('question-count').value = state.practiceCount;
        }

        // 自動去抓同目錄下的 Excel 檔案
        loadExcelFromUrl();
    };

    // 自動獲取並解析 Excel 
    async function loadExcelFromUrl() {
        try {
            const response = await fetch('./data.xlsx');
            if (!response.ok) throw new Error("檔案不存在");
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, {type: 'array'});
            
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: null});
            
            if (rows.length < 2) throw new Error("文件内容为空或格式不正确");

            const newBank = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0 || !row[0]) continue; 
                
                const questionText = String(row[0]).trim();
                const rawOptions = [];
                for(let j=1; j<=4; j++) {
                    if (row[j] !== null && row[j] !== undefined && String(row[j]).trim() !== '') {
                        rawOptions.push(String(row[j]).trim());
                    }
                }
                
                const ansStr = String(row[5] || '').trim().toUpperCase();
                const ansIndex = ansStr.charCodeAt(0) - 65; 
                
                if (ansIndex < 0 || ansIndex >= rawOptions.length) continue;

                const correctContent = String(rawOptions[ansIndex]);
                const standardOptions = rawOptions.map(opt => ({
                    content: String(opt),
                    isCorrect: String(opt) === correctContent
                }));

                newBank.push({
                    title: questionText,
                    options: standardOptions
                });
            }

            state.questionBank = newBank;
            
            document.getElementById('loading-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            updateBankInfo();
            resetQuiz();
            
        } catch (err) {
            console.error("載入題庫失敗:", err);
            document.getElementById('loading-area').style.display = 'none';
            document.getElementById('empty-area').style.display = 'block';
        }
    }

    // 更新题库信息显示（加入未做題數統計）
    function updateBankInfo() {
        const infoEle = document.getElementById('bank-info');
        if (state.questionBank.length > 0) {
            const total = state.questionBank.length;
            // 計算目前載入的題庫中，有多少題是已經做過的
            const currentDoneCount = state.questionBank.filter(q => state.doneQuestions.includes(q.title)).length;
            const remaining = total - currentDoneCount;

            infoEle.innerText = `當前題庫共 ${total} 題。您已做過 ${currentDoneCount} 題，剩餘未做：${remaining} 題。`;
            document.getElementById('question-count').max = total;
        }
    }

    // 动作确认拦截器（防止重置进行中的练习）
    function checkProgressWarning(callback) {
        if (state.quizInProgress && state.currentIndex < state.currentQuiz.length) {
            if (confirm("当前练习正在进行中，此操作将重置进度，是否继续？")) {
                callback();
            }
        } else {
            callback();
        }
    }

    // 处理姓名设置
    function handleNameSet() {
        checkProgressWarning(() => {
            const nameInput = document.getElementById('user-name').value.trim() || '匿名';
            state.userName = nameInput;
            localStorage.setItem('userName', state.userName);
            resetQuiz();
            alert("姓名已更新并重置练习。");
        });
    }

    // 处理抽取数量设置
    function handleCountSet() {
        checkProgressWarning(() => {
            let countInput = parseInt(document.getElementById('question-count').value);
            if (isNaN(countInput) || countInput < 1) countInput = 1;
            if (countInput > state.questionBank.length) countInput = state.questionBank.length;
            
            state.practiceCount = countInput;
            localStorage.setItem('practiceCount', state.practiceCount);
            document.getElementById('question-count').value = state.practiceCount;
            resetQuiz();
            alert(`已重新抽取 ${state.practiceCount} 题！`);
        });
    }

    // 手動重置刷題進度記憶
    function clearProgress() {
        if (confirm("確定要清空「已做過題目」的記憶嗎？\n這將會讓所有題目重新加入抽題池（不會刪除歷史成績紀錄）。")) {
            state.doneQuestions = [];
            localStorage.removeItem('doneQuestions');
            updateBankInfo();
            resetQuiz();
            alert("刷題進度已重置！所有題目已重新排入未做抽題池。");
        }
    }

    // 重置练习状态（修改：排除已做過的題目）
    function resetQuiz() {
        if (state.questionBank.length === 0) return;
        
        // 篩選出「還沒做過」的題目
        let availableBank = state.questionBank.filter(q => !state.doneQuestions.includes(q.title));

        // 如果全部題目都做過了，自動提示並重置進度
        if (availableBank.length === 0) {
            alert("🎉 太厲害了！本題庫的所有題目您都已經做過一遍了！系統將自動重置您的刷題進度，開啟新一輪複習。");
            state.doneQuestions = [];
            localStorage.removeItem('doneQuestions');
            availableBank = [...state.questionBank];
        }

        let count = state.practiceCount;
        // 如果想抽取的數量大於剩餘未做的題目量，則強制調整為剩餘題目量
        if (count > availableBank.length) {
            alert(`提示：剩餘未做題目僅剩 ${availableBank.length} 題，本次將為您抽取剩餘的所有題目。`);
            count = availableBank.length;
        }

        // 從未做過的題目中隨機抽取不重複的題目
        const shuffledBank = [...availableBank].sort(() => Math.random() - 0.5);
        state.currentQuiz = JSON.parse(JSON.stringify(shuffledBank.slice(0, count)));
        
        state.currentIndex = 0;
        state.correctCount = 0;
        state.quizInProgress = false; 
        
        updateBankInfo();
        renderQuestion();
    }

    // 渲染当前题目
    function renderQuestion() {
        const q = state.currentQuiz[state.currentIndex];
        const titleEle = document.getElementById('question-title');
        const container = document.getElementById('options-container');
        const feedbackEle = document.getElementById('feedback');
        
        feedbackEle.style.display = 'none';
        feedbackEle.className = 'feedback';
        document.getElementById('btn-submit').disabled = false;
        document.getElementById('btn-next').disabled = true;

        document.getElementById('progress-text').innerText = `进度: ${state.currentIndex + 1} / ${state.currentQuiz.length}`;

        let isTF = q.options.length === 2;
        let displayTitle = isTF ? `【判断题】 ${q.title}` : `【单选题】 ${q.title}`;
        titleEle.innerText = displayTitle;

        let currentOptions = q.options;
        if (!isTF && currentOptions.length >= 3) {
            currentOptions.sort(() => Math.random() - 0.5);
        }

        container.innerHTML = '';
        currentOptions.forEach((opt, idx) => {
            const labelChar = String.fromCharCode(65 + idx);
            if(opt.isCorrect) q.correctLabel = labelChar;

            const labelEle = document.createElement('label');
            labelEle.className = 'option-item';
            labelEle.innerHTML = `
                <input type="radio" name="current-opt" value="${idx}">
                <strong>${labelChar}.</strong> ${opt.content}
            `;
            container.appendChild(labelEle);
        });
    }

    // 提交答案（修改：在此處即時把題目丟進已做過清單）
    function submitAnswer() {
        const selected = document.querySelector('input[name="current-opt"]:checked');
        if (!selected) {
            alert("请选择一个答案！");
            return;
        }

        state.quizInProgress = true;
        const selectedIndex = parseInt(selected.value);
        const q = state.currentQuiz[state.currentIndex];
        const isCorrect = q.options[selectedIndex].isCorrect;

        // 【核心修改】只要點了提交，就代表這題做過了，記錄到 localStorage 中
        if (!state.doneQuestions.includes(q.title)) {
            state.doneQuestions.push(q.title);
            localStorage.setItem('doneQuestions', JSON.stringify(state.doneQuestions));
            updateBankInfo(); // 即時更新上方橫條的剩餘題數
        }

        const optionsEles = document.querySelectorAll('.option-item');
        const feedbackEle = document.getElementById('feedback');

        document.querySelectorAll('input[name="current-opt"]').forEach(el => el.disabled = true);

        optionsEles.forEach((el, idx) => {
            if (q.options[idx].isCorrect) {
                el.classList.add('correct');
            } else if (idx === selectedIndex && !isCorrect) {
                el.classList.add('wrong');
            }
        });

        if (isCorrect) {
            state.correctCount++;
            feedbackEle.innerText = "✅ 回答正确！";
            feedbackEle.className = "feedback success";
        } else {
            feedbackEle.innerText = `❌ 回答错误！正确答案是：${q.correctLabel}`;
            feedbackEle.className = "feedback error";
        }

        document.getElementById('btn-submit').disabled = true;
        
        const nextBtn = document.getElementById('btn-next');
        nextBtn.disabled = false;
        if (state.currentIndex === state.currentQuiz.length - 1) {
            nextBtn.innerText = "完成练习";
        } else {
            nextBtn.innerText = "下一题";
        }
    }

    function nextQuestion() {
        if (state.currentIndex < state.currentQuiz.length - 1) {
            state.currentIndex++;
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        const total = state.currentQuiz.length;
        const correct = state.correctCount;
        const accuracy = ((correct / total) * 100).toFixed(1) + '%';
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        const record = {
            name: state.userName,
            count: total,
            correct: correct,
            accuracy: accuracy,
            time: timeStr
        };

        state.history.unshift(record); 
        localStorage.setItem('quizHistory', JSON.stringify(state.history));
        
        state.quizInProgress = false; 
        
        alert(`🎉 练习完成！\n总题数：${total}\n答对：${correct}\n正确率：${accuracy}`);
        resetQuiz();
    }

    function openHistory() {
        const container = document.getElementById('history-table-container');
        if (state.history.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#666;">暂无做题记录</p>';
        } else {
            let html = `<table><tr><th>姓名</th><th>题目数量</th><th>答对数</th><th>正确率</th><th>完成时间</th></tr>`;
            state.history.forEach(r => {
                html += `<tr>
                    <td>${r.name}</td>
                    <td>${r.count}</td>
                    <td>${r.correct}</td>
                    <td>${r.accuracy}</td>
                    <td>${r.time}</td>
                </tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        }
        document.getElementById('history-modal').classList.add('active');
    }

    function closeHistory() {
        document.getElementById('history-modal').classList.remove('active');
    }

    function clearHistory() {
        if (state.history.length === 0) return alert("记录已经是空的。");
        const pwd = prompt("清空记录需输入密码验证：");
        if (pwd === '6666') {
            state.history = [];
            localStorage.setItem('quizHistory', JSON.stringify(state.history));
            openHistory();
            alert("记录已清空。");
        } else {
            alert("密码错误，操作取消。");
        }
    }

    // 导出 CSV
    function exportHistory() {
        if (state.history.length === 0) return alert("没有可以导出的记录。");
        
        let csvContent = "\uFEFF姓名,题目数量,答对数,正确率,完成时间\n";
        state.history.forEach(r => {
            csvContent += `${r.name},${r.count},${r.correct},${r.accuracy},${r.time}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "做题记录.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
