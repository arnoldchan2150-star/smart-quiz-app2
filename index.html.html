<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能刷题器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --primary-hover: #45a049;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #666666;
            --border-color: #dddddd;
            --correct-color: #d4edda;
            --correct-border: #c3e6cb;
            --wrong-color: #f8d7da;
            --wrong-border: #f5c6cb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1, h2, h3 { margin-top: 0; }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"], input[type="number"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 8px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover:not(:disabled) { background-color: #c82333; }
        .btn-info { background-color: #17a2b8; }
        .btn-info:hover:not(:disabled) { background-color: #138496; }

        /* 答题区样式 */
        #quiz-area { display: none; }
        .question-title { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        
        .option-item {
            display: block;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .option-item:hover { background-color: #f8f9fa; }
        .option-item input { margin-right: 10px; }
        
        .option-item.correct { background-color: var(--correct-color); border-color: var(--correct-border); }
        .option-item.wrong { background-color: var(--wrong-color); border-color: var(--wrong-border); }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: bold;
        }
        .feedback.success { background-color: var(--correct-color); color: #155724; display: block; }
        .feedback.error { background-color: var(--wrong-color); color: #721c24; display: block; }

        .action-bars { margin-top: 20px; display: flex; gap: 15px; justify-content: flex-end; }
        
        .progress-bar { font-size: 0.9em; color: var(--text-light); text-align: right; margin-bottom: 10px;}

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { cursor: pointer; font-size: 1.5em; color: #999; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }

        #file-input { display: none; }
        
        .empty-state { text-align: center; color: var(--text-light); padding: 40px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>📚 智能刷题器</h1>
        <div class="control-panel">
            <div class="input-group">
                <label>姓名：</label>
                <input type="text" id="user-name" value="匿名">
                <button onclick="handleNameSet()">确定</button>
            </div>
            <div class="input-group">
                <label>练习数量：</label>
                <input type="number" id="question-count" min="1" value="10">
                <button onclick="handleCountSet()">抽取重置</button>
            </div>
            <button onclick="handleUploadClick()" class="btn-info">上传/更换题库</button>
            <input type="file" id="file-input" accept=".xls,.xlsx" onchange="processExcel(event)">
            <button onclick="openHistory()" class="btn-info">查看记录</button>
        </div>
        <div id="bank-info" style="margin-top: 15px; font-size: 0.9em; color: var(--text-light);"></div>
    </div>

    <div class="card" id="quiz-area">
        <div class="progress-bar" id="progress-text"></div>
        <div class="question-title" id="question-title"></div>
        <div id="options-container"></div>
        
        <div class="feedback" id="feedback"></div>

        <div class="action-bars">
            <button id="btn-submit" onclick="submitAnswer()">提交答案</button>
            <button id="btn-next" onclick="nextQuestion()" disabled>下一题</button>
        </div>
    </div>
    
    <div class="card empty-state" id="empty-area">
        请先上传Excel题库。
    </div>
</div>

<div class="modal" id="history-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>做题记录</h3>
            <span class="close-btn" onclick="closeHistory()">&times;</span>
        </div>
        <div id="history-table-container"></div>
        <div class="action-bars" style="justify-content: space-between;">
            <button class="btn-danger" onclick="clearHistory()">清空记录</button>
            <button class="btn-info" onclick="exportHistory()">导出CSV</button>
        </div>
    </div>
</div>

<script>
    // 状态管理
    const state = {
        questionBank: [],    // 总题库
        currentQuiz: [],     // 当前抽取的练习题
        currentIndex: 0,     // 当前题目索引
        correctCount: 0,     // 答对数量
        userName: '匿名',    // 用户名
        practiceCount: 10,   // 练习数量
        quizInProgress: false, // 是否正在练习中（防止误触）
        history: []          // 历史记录
    };

    // 初始化
    function init() {
        // 从 localStorage 恢复数据
        const savedBank = localStorage.getItem('questionBank');
        const savedHistory = localStorage.getItem('quizHistory');
        const savedName = localStorage.getItem('userName');
        const savedCount = localStorage.getItem('practiceCount');

        if (savedBank) state.questionBank = JSON.parse(savedBank);
        if (savedHistory) state.history = JSON.parse(savedHistory);
        if (savedName) {
            state.userName = savedName;
            document.getElementById('user-name').value = savedName;
        }
        if (savedCount) {
            state.practiceCount = parseInt(savedCount);
            document.getElementById('question-count').value = state.practiceCount;
        }

        updateBankInfo();

        if (state.questionBank.length > 0) {
            document.getElementById('empty-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            resetQuiz();
        }
    }

    // 更新题库信息显示
    function updateBankInfo() {
        const infoEle = document.getElementById('bank-info');
        if (state.questionBank.length > 0) {
            infoEle.innerText = `当前题库已加载：共 ${state.questionBank.length} 题。`;
            document.getElementById('question-count').max = state.questionBank.length;
        } else {
            infoEle.innerText = '暂无题库，请上传。';
        }
    }

    // 动作确认拦截器（防止重置进行中的练习）
    function checkProgressWarning(callback) {
        if (state.quizInProgress && state.currentIndex < state.currentQuiz.length) {
            if (confirm("当前练习正在进行中，此操作将重置进度，是否继续？")) {
                callback();
            }
        } else {
            callback();
        }
    }

    // 处理姓名设置
    function handleNameSet() {
        checkProgressWarning(() => {
            const nameInput = document.getElementById('user-name').value.trim() || '匿名';
            state.userName = nameInput;
            localStorage.setItem('userName', state.userName);
            resetQuiz();
            alert("姓名已更新并重置练习。");
        });
    }

    // 处理抽取数量设置
    function handleCountSet() {
        checkProgressWarning(() => {
            let countInput = parseInt(document.getElementById('question-count').value);
            if (isNaN(countInput) || countInput < 1) countInput = 1;
            if (countInput > state.questionBank.length) countInput = state.questionBank.length;
            
            state.practiceCount = countInput;
            localStorage.setItem('practiceCount', state.practiceCount);
            document.getElementById('question-count').value = state.practiceCount;
            resetQuiz();
            alert(`已重新抽取 ${state.practiceCount} 题！`);
        });
    }

    // 处理上传按钮点击
    function handleUploadClick() {
        if (state.questionBank.length > 0) {
            const pwd = prompt("更换题库需输入密码验证：");
            if (pwd !== '6666') {
                alert("密码错误，操作取消。");
                return;
            }
        }
        document.getElementById('file-input').click();
    }

    // 解析 Excel 文件
    function processExcel(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                // 按二维数组读取
                const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: null});
                
                if (rows.length < 2) throw new Error("文件内容为空或格式不正确");

                const newBank = [];
                // 第一行是表头，从索引1开始读取
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length === 0 || !row[0]) continue; // 跳过空行
                    
                    const questionText = String(row[0]).trim();
                    const rawOptions = [];
                    // 选项 A, B, C, D 在索引 1, 2, 3, 4
                    for(let j=1; j<=4; j++) {
                        if (row[j] !== null && row[j] !== undefined && String(row[j]).trim() !== '') {
                            rawOptions.push(String(row[j]).trim());
                        }
                    }
                    
                    // 答案在索引 5
                    const ansStr = String(row[5] || '').trim().toUpperCase();
                    // 将字母答案（A, B, C, D）转换为索引
                    const ansIndex = ansStr.charCodeAt(0) - 65; 
                    
                    if (ansIndex < 0 || ansIndex >= rawOptions.length) {
                        console.warn(`第 ${i+1} 行答案无效，已跳过。`);
                        continue;
                    }

                    const correctContent = String(rawOptions[ansIndex]);
                    
                    // 构建标准化选项对象
                    const standardOptions = rawOptions.map(opt => ({
                        content: String(opt),
                        isCorrect: String(opt) === correctContent
                    }));

                    newBank.push({
                        title: questionText,
                        options: standardOptions
                    });
                }

                if (newBank.length === 0) throw new Error("未能解析出有效的题目，请检查格式。");

                state.questionBank = newBank;
                localStorage.setItem('questionBank', JSON.stringify(state.questionBank));
                
                document.getElementById('empty-area').style.display = 'none';
                document.getElementById('quiz-area').style.display = 'block';
                updateBankInfo();
                resetQuiz();
                alert(`成功导入 ${newBank.length} 道题目！`);
                
            } catch (err) {
                alert("解析文件失败：" + err.message);
            }
            // 清空 input，允许重复上传同一文件
            e.target.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    // 重置练习状态
    function resetQuiz() {
        if (state.questionBank.length === 0) return;
        
        let count = state.practiceCount;
        if (count > state.questionBank.length) count = state.questionBank.length;

        // 随机抽取不重复的题目
        const shuffledBank = [...state.questionBank].sort(() => Math.random() - 0.5);
        // 深拷贝，避免污染题库选项顺序
        state.currentQuiz = JSON.parse(JSON.stringify(shuffledBank.slice(0, count)));
        
        state.currentIndex = 0;
        state.correctCount = 0;
        state.quizInProgress = false; // 开始前不算进行中
        
        renderQuestion();
    }

    // 渲染当前题目
    function renderQuestion() {
        const q = state.currentQuiz[state.currentIndex];
        const titleEle = document.getElementById('question-title');
        const container = document.getElementById('options-container');
        const feedbackEle = document.getElementById('feedback');
        
        feedbackEle.style.display = 'none';
        feedbackEle.className = 'feedback';
        document.getElementById('btn-submit').disabled = false;
        document.getElementById('btn-next').disabled = true;

        document.getElementById('progress-text').innerText = `进度: ${state.currentIndex + 1} / ${state.currentQuiz.length}`;

        let isTF = q.options.length === 2;
        let displayTitle = isTF ? `【判断题】 ${q.title}` : `【单选题】 ${q.title}`;
        titleEle.innerText = displayTitle;

        // 处理选项顺序
        let currentOptions = q.options;
        if (!isTF && currentOptions.length >= 3) {
            // 随机打乱选项
            currentOptions.sort(() => Math.random() - 0.5);
        }

        // 生成 DOM
        container.innerHTML = '';
        currentOptions.forEach((opt, idx) => {
            // 动态分配 A, B, C...
            const labelChar = String.fromCharCode(65 + idx);
            // 缓存打乱后的正确答案文本用于后续展示
            if(opt.isCorrect) q.correctLabel = labelChar;

            const labelEle = document.createElement('label');
            labelEle.className = 'option-item';
            labelEle.innerHTML = `
                <input type="radio" name="current-opt" value="${idx}">
                <strong>${labelChar}.</strong> ${opt.content}
            `;
            container.appendChild(labelEle);
        });
    }

    // 提交答案
    function submitAnswer() {
        const selected = document.querySelector('input[name="current-opt"]:checked');
        if (!selected) {
            alert("请选择一个答案！");
            return;
        }

        state.quizInProgress = true; // 标记练习进行中
        const selectedIndex = parseInt(selected.value);
        const q = state.currentQuiz[state.currentIndex];
        const isCorrect = q.options[selectedIndex].isCorrect;

        const optionsEles = document.querySelectorAll('.option-item');
        const feedbackEle = document.getElementById('feedback');

        // 锁定选项
        document.querySelectorAll('input[name="current-opt"]').forEach(el => el.disabled = true);

        // 标记颜色
        optionsEles.forEach((el, idx) => {
            if (q.options[idx].isCorrect) {
                el.classList.add('correct');
            } else if (idx === selectedIndex && !isCorrect) {
                el.classList.add('wrong');
            }
        });

        if (isCorrect) {
            state.correctCount++;
            feedbackEle.innerText = "✅ 回答正确！";
            feedbackEle.className = "feedback success";
        } else {
            feedbackEle.innerText = `❌ 回答错误！正确答案是：${q.correctLabel}`;
            feedbackEle.className = "feedback error";
        }

        document.getElementById('btn-submit').disabled = true;
        
        const nextBtn = document.getElementById('btn-next');
        nextBtn.disabled = false;
        if (state.currentIndex === state.currentQuiz.length - 1) {
            nextBtn.innerText = "完成练习";
        } else {
            nextBtn.innerText = "下一题";
        }
    }

    // 下一题 / 完成练习
    function nextQuestion() {
        if (state.currentIndex < state.currentQuiz.length - 1) {
            state.currentIndex++;
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    // 完成练习保存记录
    function finishQuiz() {
        const total = state.currentQuiz.length;
        const correct = state.correctCount;
        const accuracy = ((correct / total) * 100).toFixed(1) + '%';
        const now = new Date();
        const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        const record = {
            name: state.userName,
            count: total,
            correct: correct,
            accuracy: accuracy,
            time: timeStr
        };

        state.history.unshift(record); // 插入到头部
        localStorage.setItem('quizHistory', JSON.stringify(state.history));
        
        state.quizInProgress = false; // 结束练习
        
        alert(`🎉 练习完成！\n总题数：${total}\n答对：${correct}\n正确率：${accuracy}`);
        resetQuiz();
    }

    // 历史记录控制
    function openHistory() {
        const container = document.getElementById('history-table-container');
        if (state.history.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#666;">暂无做题记录</p>';
        } else {
            let html = `<table><tr><th>姓名</th><th>题目数量</th><th>答对数</th><th>正确率</th><th>完成时间</th></tr>`;
            state.history.forEach(r => {
                html += `<tr>
                    <td>${r.name}</td>
                    <td>${r.count}</td>
                    <td>${r.correct}</td>
                    <td>${r.accuracy}</td>
                    <td>${r.time}</td>
                </tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        }
        document.getElementById('history-modal').classList.add('active');
    }

    function closeHistory() {
        document.getElementById('history-modal').classList.remove('active');
    }

    function clearHistory() {
        if (state.history.length === 0) return alert("记录已经是空的。");
        const pwd = prompt("清空记录需输入密码验证：");
        if (pwd === '6666') {
            state.history = [];
            localStorage.setItem('quizHistory', JSON.stringify(state.history));
            openHistory(); // 刷新表格
            alert("记录已清空。");
        } else {
            alert("密码错误，操作取消。");
        }
    }

    // 导出 CSV
    function exportHistory() {
        if (state.history.length === 0) return alert("没有可以导出的记录。");
        
        let csvContent = "\uFEFF姓名,题目数量,答对数,正确率,完成时间\n";
        state.history.forEach(r => {
            csvContent += `${r.name},${r.count},${r.correct},${r.accuracy},${r.time}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "做题记录.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 页面加载运行
    window.onload = init;
</script>

</body>
</html>
